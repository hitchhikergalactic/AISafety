              serif: ['Alegreya', 'serif'],

            colors: {
              principal: '#ff4500',

          }
        }
      }
      if (localStorage.getItem('app_theme') === 'dark' || (!('app_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {

      body {
